<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>closed:in, onze werkwijze, voor Flow Factoring</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15151c; --ink-dim:#6c6c79; --ink-faint:#9a9aa6;
    --line:#e8e8ef; --line-2:#dcdce6;
    --orange:#ff7a2a; --orange-soft:#ffb27e; --purple:#7877c6;
    --node:#ffffff;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0; height:100%; overflow:hidden; background:#fbfbfd; color:var(--ink);
    font-family:'Satoshi',system-ui,-apple-system,sans-serif; -webkit-font-smoothing:antialiased}
  body{background-color:#fbfbfd;
    background-image:radial-gradient(#d9d9e3 1.1px, transparent 1.1px);
    background-size:24px 24px}
  .canvas{position:fixed; inset:0; overflow:hidden}
  .stage{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    transform-origin:center center; width:1340px; height:720px}

  /* header */
  .hdr{position:absolute; top:24px; left:48px; right:48px; display:flex; align-items:center; justify-content:space-between}
  .hdr .ci img{height:30px; display:block}
  .hdr .client{display:flex; align-items:center; gap:12px; font-size:18px; font-weight:700; letter-spacing:-.02em}
  .hdr .client .x{color:var(--ink-faint); font-weight:500}
  .hdr .client .logo{height:38px; display:flex; align-items:center; gap:9px}
  .hdr .client .logo img{height:38px; display:block}
  .hdr .client .ph{height:30px; min-width:84px; border:1.5px dashed var(--line-2); border-radius:8px;
    display:grid; place-items:center; font-size:11px; color:var(--ink-faint); font-weight:600; padding:0 12px}

  /* title */
  .title{position:absolute; top:52px; left:0; right:0; text-align:center}
  .title .eye{font-family:ui-monospace,"SF Mono",monospace; font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--orange); font-weight:600}
  .title h1{margin:8px 0 0; font-size:28px; letter-spacing:-.03em; font-weight:700}
  .title h1 b{color:var(--orange); font-weight:700}

  /* svg wires (under nodes) */
  .wires{position:absolute; inset:0; z-index:1; pointer-events:none; overflow:visible}
  .wires .base{fill:none; stroke:var(--line-2); stroke-width:2.5}
  .wires .flow{fill:none; stroke:var(--orange); stroke-width:2.5; stroke-dasharray:2 9; stroke-linecap:round;
    animation:flow 1.1s linear infinite}
  .wires .arrow{fill:var(--orange)}
  .wires .loop{fill:none; stroke:var(--orange-soft); stroke-width:2; stroke-dasharray:7 7; animation:flow 1.2s linear infinite}
  .wires .crm{fill:none; stroke:var(--purple); stroke-width:2; stroke-dasharray:7 7; animation:flow 1.3s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-22}}

  /* main nodes */
  .node{position:absolute; z-index:2; background:var(--node); border:1px solid var(--line);
    border-radius:18px; padding:18px 16px 16px;
    box-shadow:0 14px 34px -20px rgba(20,20,50,.30), 0 1px 2px rgba(20,20,50,.05);
    transition:transform .4s var(--ease), box-shadow .4s var(--ease), border-color .4s var(--ease)}
  .node:hover{transform:translateY(-4px); border-color:#ffd6b8;
    box-shadow:0 24px 44px -22px rgba(255,122,42,.55), 0 1px 2px rgba(20,20,50,.05); z-index:20}
  .node .num{position:absolute; top:12px; right:14px; font-family:ui-monospace,monospace; font-size:11px; color:var(--orange); font-weight:600}
  .node .ico{display:flex; align-items:center; gap:7px; height:48px}
  .node .ico .chip{width:46px; height:46px; border-radius:12px; background:#faf8f6; border:1px solid var(--line);
    display:grid; place-items:center; overflow:hidden}
  .node .ico .chip img{width:30px; height:30px; object-fit:contain; display:block}
  .node .ico .chip img.fill{width:100%; height:100%; object-fit:cover}
  .node .ico .chip svg{width:24px; height:24px}
  .node h3{margin:14px 0 4px; font-size:16px; letter-spacing:-.02em; font-weight:650}
  .node p{margin:0; font-size:12.5px; color:var(--ink-dim); line-height:1.35}
  .node .tool{position:absolute; bottom:12px; right:14px; font-family:ui-monospace,monospace; font-size:9.5px;
    letter-spacing:.04em; color:var(--ink-faint)}

  /* side blocks (inputs feeding into a node) */
  .side{position:absolute; z-index:2; background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:11px 13px; box-shadow:0 10px 26px -18px rgba(20,20,50,.30);
    transition:transform .4s var(--ease), box-shadow .4s var(--ease)}
  .side:hover{transform:translateY(-3px); z-index:20}
  .side.opt{border-style:dashed; border-color:#ffd0ad; background:#fffaf6}
  .side .slabel{font-family:ui-monospace,monospace; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-faint); margin-bottom:9px; display:flex; align-items:center; gap:6px}
  .side.opt .slabel{color:var(--orange)}
  .side .slabel .plus{flex:0 0 15px; width:15px; height:15px; border-radius:50%;
    background:var(--orange); color:#fff; display:inline-grid; place-items:center; font-size:11px; line-height:1; font-weight:700}
  .side .slogos{display:flex; gap:8px; align-items:center}
  .side .slogos .l{width:30px; height:30px; border-radius:8px; background:#faf8f6; border:1px solid var(--line);
    display:grid; place-items:center; overflow:hidden}
  .side .slogos .l img{width:20px; height:20px; object-fit:contain; display:block}
  .side .slogos .l img.fill{width:100%; height:100%; object-fit:cover}
  .side .slogos .l svg{width:18px; height:18px}
  .side.compact{display:flex; align-items:center; gap:10px; padding:0 14px}
  .side.compact .l{flex:0 0 auto; width:30px; height:30px; border-radius:8px; background:#faf8f6; border:1px solid var(--line); display:grid; place-items:center; overflow:hidden}
  .side.compact .l img{width:20px; height:20px; object-fit:contain}
  .side.compact .l svg{width:20px; height:20px}
  .side.compact .ctext{display:flex; flex-direction:column; line-height:1.15}
  .side.compact .ctext b{font-size:12.5px; color:var(--ink); font-weight:650; letter-spacing:-.01em}
  .side.compact .ctext small{font-family:ui-monospace,monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--orange)}

  /* hover detail popup */
  .pop{position:absolute; left:50%; top:calc(100% + 11px); transform:translateX(-50%) translateY(5px);
    width:238px; background:#fff; border:1px solid var(--line-2); border-radius:12px; padding:12px 14px;
    font-size:11.5px; line-height:1.5; color:var(--ink-dim); text-align:left;
    box-shadow:0 20px 44px -18px rgba(20,20,50,.5); opacity:0; pointer-events:none;
    transition:opacity .22s var(--ease), transform .22s var(--ease); z-index:30}
  .pop::before{content:""; position:absolute; top:-6px; left:50%; transform:translateX(-50%) rotate(45deg);
    width:11px; height:11px; background:#fff; border-left:1px solid var(--line-2); border-top:1px solid var(--line-2)}
  .node:hover .pop, .side:hover .pop{opacity:1; transform:translateX(-50%) translateY(0)}

  /* loop label */
  .loop-label{position:absolute; z-index:2; font-family:ui-monospace,monospace; font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--orange); background:#fff; padding:5px 12px; border:1px solid var(--line-2);
    border-radius:999px; transform:translateX(-50%); box-shadow:0 6px 16px -10px rgba(20,20,50,.3)}
  .loop-label.alt{color:var(--purple); border-color:#d2d1f0}

  .cap{position:absolute; bottom:20px; left:0; right:0; text-align:center; font-size:12px; color:var(--ink-faint)}
  @media (prefers-reduced-motion:reduce){ .wires .flow,.wires .loop{animation:none} }
</style>
</head>
<body>

<!-- =======================================================================
     Flow Factoring versie.  Aangepast t.o.v. het template:
     1. CLIENT_NAME / CLIENT_LOGO ingevuld (logo = wordmark, dus geen naam ernaast)
     2. Stap 01 (Doelgroep) beschrijft Flow Factoring's eigen ICP:
        uitzend, detachering en payroll met werkkapitaalbehoefte
     De rest is de vaste closed:in werkwijze.
======================================================================== -->
<div class="canvas"><div class="stage" id="stage">
  <div class="hdr">
    <div class="ci"><img src="assets/closedin-logo-dark.png" alt="closed:in"></div>
    <div class="client"><span class="x">voor</span><span class="logo" id="clientLogo"></span></div>
  </div>
  <div class="title">
    <div class="eye">onze werkwijze</div>
    <h1>Van lead tot <b>gekwalificeerd gesprek</b></h1>
  </div>
  <svg class="wires" id="wires" aria-hidden="true"></svg>
  <div id="nodes"></div>
  <div class="cap">Beweeg over een blok voor meer uitleg. Eén doorlopend systeem dat elke week bijleert.</div>
</div></div>

<script>
  /* ====================== CONFIG ====================== */
  const CLIENT_NAME = "Flow Factoring";
  const CLIENT_LOGO = "assets/flowfactoring-logo.png";   // wordmark, wordt zonder naam-tekst getoond

  // logo's met een eigen gekleurd vierkant: vullend tonen + ronde hoeken (app-icoon)
  const FILL = ['apollo.png','linkedin.png','hubspot.png','heyreach.png'];
  const isFill = p => FILL.some(f => p.endsWith(f));

  const ICONS = {
    target:'<svg viewBox="0 0 24 24" fill="none" stroke="#ff7a2a" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6" fill="#ff7a2a" stroke="none"/></svg>',
    repeat:'<svg viewBox="0 0 24 24" fill="none" stroke="#ff7a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
    eye:'<svg viewBox="0 0 24 24" fill="none" stroke="#ff7a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
    slack:'<svg viewBox="0 0 122.8 122.8"><path d="M25.8 77.6c0 7.1-5.8 12.9-12.9 12.9S0 84.7 0 77.6s5.8-12.9 12.9-12.9h12.9v12.9z" fill="#E01E5A"/><path d="M32.3 77.6c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9v32.3c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V77.6z" fill="#E01E5A"/><path d="M45.2 25.8c-7.1 0-12.9-5.8-12.9-12.9S38.1 0 45.2 0s12.9 5.8 12.9 12.9v12.9H45.2z" fill="#36C5F0"/><path d="M45.2 32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H12.9C5.8 58.1 0 52.3 0 45.2s5.8-12.9 12.9-12.9h32.3z" fill="#36C5F0"/><path d="M97 45.2c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9-5.8 12.9-12.9 12.9H97V45.2z" fill="#2EB67D"/><path d="M90.5 45.2c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V12.9C64.7 5.8 70.5 0 77.6 0s12.9 5.8 12.9 12.9v32.3z" fill="#2EB67D"/><path d="M77.6 97c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9-12.9-5.8-12.9-12.9V97h12.9z" fill="#ECB22E"/><path d="M77.6 90.5c-7.1 0-12.9-5.8-12.9-12.9s5.8-12.9 12.9-12.9h32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H77.6z" fill="#ECB22E"/></svg>'
  };

  // main pipeline (left -> right)
  const STEPS = [
    {title:'Doelgroep', sub:'uitzend, detachering & payroll', media:[{icon:'target'}], tool:'',
      detail:'We brengen jullie ideale klant scherp in kaart: uitzendbureaus, detacheerders en payrollbedrijven in Nederland met werkkapitaalbehoefte. Op basis van de SNA-, NBBU- en ABU-registers bepalen we de marktomvang en het volume voor de campagne.'},
    {title:'Lijst + verrijking', sub:'de juiste bedrijven en mensen', media:[{logo:'assets/clay.png'}], tool:'Clay',
      detail:'In Clay bouwen we de lijst van de juiste bedrijven en personen, denk aan de eigenaar of financieel directeur, en verrijken die met e-mailadressen en context, zodat elke regel klopt voordat er iets uitgaat.'},
    {title:'Inboxen + warmup', sub:'veilig klaar om te versturen', media:[{logo:'assets/instantly.png'}], tool:'Instantly',
      detail:'We zetten aparte verzenddomeinen en inboxen op, los van jullie hoofddomein, en warmen ze 2 tot 3 weken op zodat de e-mails netjes in de inbox aankomen.'},
    {title:'Outreach', sub:'e-mail, per persona', media:[{logo:'assets/instantly.png'}], tool:'Instantly',
      detail:'Een 3-step sequence per segment, met een eigen call-to-action per persona. We testen segment en messaging tegen elkaar en bouwen door op wat werkt.'},
    {title:'Opvolging', sub:'replies, gesprekken, warme bezoekers', media:[{logo:'assets/salesforce.png'},{logo:'assets/hubspot.png'}], tool:'CRM',
      detail:'Replies, geboekte gesprekken en warme bezoekers komen gestructureerd in het CRM terecht. Die CRM-data gebruiken we ook weer om lijsten te verrijken en mensen later opnieuw te benaderen (renurture).'},
    {title:'Bijsturen', sub:'wekelijks rapport, elke week beter', media:[{icon:'repeat'}], tool:'',
      detail:'Elke week een rapport met wat eruit ging en wat terugkwam. Daarop scherpen we de lijsten en de teksten aan, zodat het systeem steeds beter presteert.'}
  ];

  // side inputs that feed INTO a main node (target = index, dx = offset t.o.v. node-midden)
  const SIDE = [
    {target:1, dx:0, w:238, optional:false, label:'lead bronnen',
      logos:['assets/apollo.png','assets/linkedin.png','assets/apify.png','assets/claude.png'],
      detail:'De bronnen waar we leads vandaan halen: de SNA- en NBBU-registers, Apollo, LinkedIn Sales Navigator, Apify (scraping) en Claygent (AI-onderzoek). We combineren ze, zodat we ook bedrijven vinden die in één bron niet zichtbaar zijn.'},
    {target:3, dx:-130, w:154, optional:false, label:'LinkedIn',
      logos:['assets/heyreach.png'],
      detail:'HeyReach is onze LinkedIn-tool. Naast e-mail zetten we ook LinkedIn in: connectieverzoeken en berichten vanuit een eigen profiel, als extra kanaal naar dezelfde mensen.'}
  ];
  /* ==================================================== */

  const STAGE_W=1340, STAGE_H=720;
  const PAD=48, NW=185, GAP=26, ROW_Y=266, NH=196;
  const SIDE_Y=132, SIDE_H=80;
  const stage=document.getElementById('stage');
  const nodesEl=document.getElementById('nodes');
  const wires=document.getElementById('wires');

  // client name + logo (logo is een wordmark, dus tonen we het logo zonder extra naam-tekst)
  const cl=document.getElementById('clientLogo');
  if(CLIENT_LOGO){
    cl.innerHTML='<img src="'+CLIENT_LOGO+'" alt="'+CLIENT_NAME+'">';
  } else {
    cl.innerHTML='<span class="ph">'+CLIENT_NAME+'</span>';
  }

  // main nodes
  const N=STEPS.length, xs=[];
  STEPS.forEach((s,i)=>{
    const x=PAD + i*(NW+GAP); xs.push(x);
    const media=s.media.map(m=>{
      if(m.icon) return '<span class="chip">'+ICONS[m.icon]+'</span>';
      return '<span class="chip"><img src="'+m.logo+'"'+(isFill(m.logo)?' class="fill"':'')+' alt=""></span>';
    }).join('');
    const node=document.createElement('div');
    node.className='node';
    node.style.cssText=`left:${x}px; top:${ROW_Y}px; width:${NW}px; height:${NH}px`;
    node.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span>`+
      `<div class="ico">${media}</div><h3>${s.title}</h3><p>${s.sub}</p>`+
      (s.tool?`<span class="tool">${s.tool}</span>`:'')+
      `<div class="pop">${s.detail}</div>`;
    nodesEl.appendChild(node);
  });

  // side input blocks
  SIDE.forEach(sb=>{
    const cx=xs[sb.target]+NW/2+(sb.dx||0);
    const x=cx-sb.w/2;
    let media;
    if(sb.icon){ media='<span class="l">'+ICONS[sb.icon]+'</span>'; }
    else { media=sb.logos.map(l=>'<span class="l"><img src="'+l+'"'+(isFill(l)?' class="fill"':'')+' alt=""></span>').join(''); }
    const el=document.createElement('div');
    el.className='side'+(sb.optional?' opt':'');
    el.style.cssText=`left:${x}px; top:${SIDE_Y}px; width:${sb.w}px; height:${SIDE_H}px`;
    el.innerHTML=`<div class="slabel">${sb.optional?'<span class="plus">+</span>':''}${sb.label}</div>`+
      `<div class="slogos">${media}</div><div class="pop">${sb.detail}</div>`;
    nodesEl.appendChild(el);
  });

  // website visitors -> Slack (human in the loop) -> Outreach
  const chCx=815, chW=150, wbY=132, wbH=44, skY=188, skH=46;
  const mkChain=(y,h,inner,detail)=>{ const el=document.createElement('div');
    el.className='side compact'; el.style.cssText=`left:${chCx-chW/2}px; top:${y}px; width:${chW}px; height:${h}px`;
    el.innerHTML=inner+`<div class="pop">${detail}</div>`; nodesEl.appendChild(el); };
  mkChain(wbY,wbH,'<span class="l">'+ICONS.eye+'</span><div class="ctext"><b>website visitors</b></div>',
    'We zien welke bedrijven jullie site bezoeken, ook als ze niets invullen, en sturen dat live door.');
  mkChain(skY,skH,'<span class="l">'+ICONS.slack+'</span><div class="ctext"><b>Slack</b><small>human in the loop</small></div>',
    'De warme bezoekers komen binnen in Slack. Een mens beslist wie we in de outreach oppakken, dus geen automatische blast.');

  // wires
  const cy=ROW_Y+NH/2;
  let svg='';
  for(let i=0;i<N-1;i++){
    const x1=xs[i]+NW, x2=xs[i+1];
    const d=`M ${x1} ${cy} C ${x1+GAP*0.6} ${cy}, ${x2-GAP*0.6} ${cy}, ${x2-7} ${cy}`;
    svg+=`<path class="base" d="${d}"/><path class="flow" d="${d}"/><path class="arrow" d="M ${x2-1} ${cy} l -8 -5 v 10 z"/>`;
  }
  // side connectors (down into node top, with slight curve when offset)
  SIDE.forEach(sb=>{
    const cx=xs[sb.target]+NW/2+(sb.dx||0), y1=SIDE_Y+SIDE_H, y2=ROW_Y;
    const tx=xs[sb.target]+NW/2+(sb.dx||0)*0.45;
    const d=`M ${cx} ${y1} C ${cx} ${y1+22}, ${tx} ${y2-22}, ${tx} ${y2-6}`;
    if(sb.optional){
      svg+=`<path class="loop" d="${d}"/><path class="arrow" d="M ${tx} ${y2} l -5 -9 h 10 z" fill="#ffb27e"/>`;
    } else {
      svg+=`<path class="base" d="${d}"/><path class="flow" d="${d}"/><path class="arrow" d="M ${tx} ${y2} l -5 -9 h 10 z"/>`;
    }
  });
  // website-visitors -> slack -> outreach connectors
  const cD1=`M ${chCx} ${wbY+wbH} V ${skY-2}`;
  svg+=`<path class="base" d="${cD1}"/><path class="flow" d="${cD1}"/><path class="arrow" d="M ${chCx} ${skY} l -5 -9 h 10 z"/>`;
  const oTx=xs[3]+NW/2+40;
  const cD2=`M ${chCx} ${skY+skH} C ${chCx} ${skY+skH+18}, ${oTx} ${ROW_Y-18}, ${oTx} ${ROW_Y-6}`;
  svg+=`<path class="base" d="${cD2}"/><path class="flow" d="${cD2}"/><path class="arrow" d="M ${oTx} ${ROW_Y} l -5 -9 h 10 z"/>`;

  // feedback loops: outer = wekelijks bijsturen (06 -> 02), inner = CRM enrichment + renurture (05 -> 02)
  const by=ROW_Y+NH, r=18;
  const yo=by+96, yi=by+52;
  const sxO=xs[N-1]+NW/2, exO=xs[1]+105;
  const sxI=xs[4]+NW/2,   exI=xs[1]+150;
  const arc=(sx,ex,y)=>`M ${sx} ${by} V ${y-r} Q ${sx} ${y} ${sx-r} ${y} H ${ex+r} Q ${ex} ${y} ${ex} ${y-r} V ${by+6}`;
  svg+=`<path class="loop" d="${arc(sxO,exO,yo)}"/><path class="arrow" d="M ${exO} ${by} l -5 9 h 10 z" fill="#ffb27e"/>`;
  svg+=`<path class="crm" d="${arc(sxI,exI,yi)}"/><path class="arrow" d="M ${exI} ${by} l -5 9 h 10 z" fill="#7877c6"/>`;
  wires.setAttribute('viewBox',`0 0 ${STAGE_W} ${STAGE_H}`);
  wires.style.width=STAGE_W+'px'; wires.style.height=STAGE_H+'px';
  wires.innerHTML=svg;

  // loop labels
  const mkLabel=(txt,cls,cx,cyy)=>{ const l=document.createElement('div'); l.className='loop-label'+(cls?' '+cls:'');
    l.textContent=txt; l.style.left=cx+'px'; l.style.top=(cyy-13)+'px'; stage.appendChild(l); };
  mkLabel('elke week bijsturen','',(exO+sxO)/2,yo);
  mkLabel('CRM enrichment + renurture','alt',(exI+sxI)/2,yi);

  // fit whole stage to screen (one view, no scroll)
  function fit(){
    const pad=36;
    const s=Math.min((window.innerWidth-pad)/STAGE_W,(window.innerHeight-pad)/STAGE_H);
    stage.style.transform=`translate(-50%,-50%) scale(${s})`;
  }
  fit(); window.addEventListener('resize',fit);
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(fit); }
</script>
</body>
</html>
